server:
  port: 8082

spring:
  application:
    name: currency-converter-api
  datasource:
    url: jdbc:h2:mem:currencydb
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  external:
    frankfurter:
      base-url: https://api.frankfurter.dev
  security:
    api-keys:
      demo-key-123: Demo User
      student-key-456: Student User
